/* styles.css */
/* ============================================================
   EUROPE TRIP PLANNER — Wanderbook-reskinned
   Structure/behaviour from the Europe Trip Planner design spec;
   visual language (type + palette) from the Wanderbook system.
   ============================================================ */

:root {
  /* ---- Wanderbook palette (base) ---- */
  --ink:        #1a1a1a;   /* primary text */
  --ink-mid:    #3d3826;
  --ink-soft:   #7a7260;   /* secondary text */
  --ink-mute:   #a89e8c;   /* muted / placeholder */
  --ink-faint:  #c8c2ae;   /* faintest */
  --brown:      #23140C;   /* structural: dark pills, buttons, nodes */
  --red:        #91040C;   /* interactive / active: stops, cash, flight */
  --shell:      #e8e4dc;   /* paper page background */
  --surface:    #ffffff;   /* card surface */

  /* ---- retained functional accents ---- */
  --gold:       #C8901F;   /* miles / award / itinerary / links */
  --gold-soft:  #FCF7EC;   /* itinerary button surface */
  --gold-border:#F0E2C9;
  --gold-hover: #F8EFD8;
  --green:      #5E8475;   /* sub-dates, saved, train, chosen */
  --green-dark: #46604F;   /* overnight train */
  --green-bg:   #EAF4EF;

  /* ---- hairlines / borders (warm-remapped) ---- */
  --line:       #e4ded3;   /* was #EBE6E2 */
  --line-2:     #efeae0;   /* was #F1ECE8 */
  --line-3:     #c4bba8;   /* was #E4DDD7 (spine) */
  --dash:       #cdc4b5;   /* was #D8D0CA (dashed) */

  /* ---- calendar / closet warm fills ---- */
  --stay-fill:  #FBEEE9;
  --stay-line:  #EBD2C9;
  --map-bg:     #EDE7E2;

  /* ---- type ---- */
  --serif:  'Playfair Display', Georgia, serif;
  --sans:   'Sora', system-ui, sans-serif;
  --caps:   'Bebas Neue', 'DM Sans', sans-serif;
  --script: 'Jost', sans-serif;

  /* ---- radii (from spec) ---- */
  --r-pill: 999px; --r-modal: 18px; --r-card: 13px; --r-cell: 12px;
  --r-btn: 9px; --r-sm: 8px; --r-xs: 7px; --r-check: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { background: var(--shell); height: 100%; }
body {
  font-family: var(--sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-y: auto; /* scrolls on small screens; overridden to hidden on wide */
}

button { font-family: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
input::placeholder, textarea::placeholder { color: var(--ink-mute); }
a { color: inherit; }
:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
.tab-active input:focus-visible { outline: none; }


/* ============================================================
   PAGE SHELL
   ============================================================ */
.page {
  max-width: 1360px;
  margin: 0 auto;
  padding: 14px 20px 10px;
  color: var(--ink);
}

.body-cols {
  display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start;
}

/* ============================================================
   HEADER
   ============================================================ */
.header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }

.trip-title {
  font-family: var(--serif);
  font-size: 42px; font-weight: 900; letter-spacing: -.025em;
  line-height: 1; color: var(--ink);
  border: none; background: transparent; padding: 0;
  field-sizing: content; min-width: 2ch; max-width: 100%;
  outline-offset: 4px;
}
.date-badge {
  font-family: var(--caps);
  font-size: 17px; letter-spacing: .04em;
  color: var(--green); line-height: 1;
}
.saved {
  font-family: var(--script); font-style: italic; font-weight: 300; font-size: 13px;
  color: var(--green); margin-left: auto;
  transition: opacity .5s ease;
}
.toolbar { display: flex; gap: 6px; align-items: center; }
.tool-btn {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border: 1px solid var(--line); background: var(--surface);
  border-radius: var(--r-btn); cursor: pointer; color: var(--ink-soft);
  transition: background .15s;
}
.tool-btn:hover { background: var(--line-2); }
.tool-btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.tool-lbl { display: none; font-family: var(--sans); font-size: 9px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; line-height: 1; }
@media (max-width: 480px) {
  .tool-btn { flex-direction: column; gap: 3px; width: auto; padding: 6px 8px; height: auto; }
  .tool-lbl { display: block; }
}
.toolbar-divider {
  width: 1px;
  height: 22px;
  background: var(--line-2);
  margin: 0 2px;
  flex-shrink: 0;
}
.sticker-toggle-btn {
  background: var(--gold-soft) !important;
  color: var(--gold) !important;
  border-color: color-mix(in oklch, var(--gold) 25%, transparent) !important;
  transition: background .15s, box-shadow .15s;
}
.sticker-toggle-btn:hover {
  background: color-mix(in oklch, var(--gold-soft) 85%, var(--gold)) !important;
  box-shadow: 0 2px 8px rgba(35,20,12,.14);
}
.sticker-toggle-btn.active {
  background: var(--gold) !important;
  color: var(--surface) !important;
  border-color: var(--gold) !important;
}

/* ============================================================
   TRIP SWITCHER
   ============================================================ */
.tabs-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 0 0 10px; }
.tabs {
  display: inline-flex; gap: 3px;
  background: var(--line-2); border: 1px solid var(--line);
  border-radius: var(--r-pill); padding: 4px;
}
.tab-active {
  display: inline-flex; align-items: center;
  background: var(--brown); border-radius: var(--r-pill);
  cursor: grab;
}
.tab-active input {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 8px 4px 8px 16px; border: none; background: transparent;
  color: #fff; cursor: text; outline-offset: 2px;
}
.tab-x {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; margin-right: 6px;
  border: none; background: transparent; color: rgba(255,255,255,.7);
  cursor: pointer; font-family: var(--sans); font-size: 17px; font-weight: 800;
  line-height: 1; padding: 0;
}
.tab-inactive {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 8px 18px; border-radius: var(--r-pill); border: none;
  background: transparent; color: var(--ink-soft); cursor: grab;
}
.add-trip {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; border: 1px dashed var(--dash);
  background: transparent; border-radius: var(--r-pill); cursor: pointer;
  color: var(--ink-soft); font-family: var(--sans); font-size: 20px;
  font-weight: 800; line-height: 1;
}

/* ============================================================
   TRIP META
   ============================================================ */
.meta-row { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-end; margin: 0 0 8px; }
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-field label {
  font-family: var(--sans); font-size: 10px; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-mute);
}
.meta-field input {
  font-family: var(--sans); font-size: 13px; color: var(--ink);
  border: none; border-bottom: 1px solid var(--line);
  background: transparent; padding: 3px 0;
}
.meta-field.travelers input { width: 50px; }
.travelers-pip { display: flex; flex-direction: row; align-items: flex-end; gap: 2px; min-height: 24px; padding-bottom: 8px; }
.traveler-icon { background: none; border: none; padding: 0; cursor: pointer; color: var(--ink-soft); opacity: 0.85; line-height: 0; }
.traveler-icon:hover { color: var(--red); opacity: 1; }
.traveler-add { background: none; border: 1px dashed var(--ink-faint); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; cursor: pointer; color: var(--ink-faint); padding: 0; }
.traveler-add:hover { border-color: var(--ink-soft); color: var(--ink-soft); }

/* ============================================================
   ROUTE (left column)
   ============================================================ */
.route { flex: 1 1 460px; min-width: 300px; position: relative; }
.route-spine {
  position: absolute; left: 14px; top: 14px; bottom: 30px; width: 2px;
  pointer-events: none;
}
.route-spine svg { width: 6px; height: 100%; overflow: visible; }
.route-spine path { stroke: var(--line-3); stroke-width: 2; fill: none; }

/* endpoint (origin / home) */
.endpoint { position: relative; padding: 12px 0 12px 40px; }
.endpoint .node {
  position: absolute; left: 8px; top: 15px; width: 13px; height: 13px;
  border-radius: 50%; background: var(--surface); border: 2px solid var(--brown);
  box-sizing: border-box;
}
.endpoint .row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.endpoint input {
  font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; padding: 2px 0; min-width: 130px; outline-offset: 3px;
}
.endpoint .date { font-family: var(--script); font-style: italic; font-size: 14px; color: var(--ink-soft); align-self: flex-end; }

/* leg */
.leg { position: relative; padding: 0 0 0 40px; }
.leg .inner { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 7px 0; }
.leg select {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 5px 8px;
  background: var(--surface); color: var(--ink); cursor: pointer;
}
.leg .dur {
  font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
  border: none; border-bottom: 1px solid var(--line); background: transparent;
  padding: 4px 2px; flex: 1; min-width: 110px; outline-offset: 2px;
}
.leg .cost-wrap { display: inline-flex; align-items: center; gap: 5px; }
.leg .cost-wrap--fb { background: var(--gold-soft); border-radius: var(--r-xs); padding: 0 5px 0 3px; border: 1px solid var(--gold-border); }
.leg .cost-wrap--fb .cost { background: transparent; border-color: transparent; color: var(--gold); }
.leg .cost-wrap--fb .unit { color: var(--gold); font-weight: 600; }
.leg .cost {
  font-family: var(--sans); font-size: 12px; width: 62px;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 5px 6px;
  background: var(--surface); text-align: right; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.leg .unit { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); min-width: 34px; }
.leg .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.insert {
  font-family: var(--sans); font-size: 16px; font-weight: 700; line-height: 1;
  color: var(--ink-mute); border: 1px dashed var(--dash); background: transparent;
  border-radius: var(--r-xs); padding: 3px 9px; cursor: pointer;
}

/* stop card */
.stop { position: relative; padding: 6px 0 4px 40px; transition: opacity .15s; contain: layout; }
.stop .dot {
  position: absolute; left: 5px; top: 27px; width: 19px; height: 19px;
  border-radius: 50%; background: var(--red); border: 3px solid var(--shell);
  box-sizing: border-box;
}
.card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 11px 16px 11px;
  box-shadow: 0 1px 2px rgba(33,26,24,.04);
}
.stop .head { display: flex; align-items: center; gap: 10px; }
.stop .city {
  font-family: 'Josefin Sans', sans-serif; font-size: 36px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; color: var(--ink);
  border: none; background: transparent; padding: 0; flex: 1; min-width: 0; outline-offset: 3px;
}
.iti-btn {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; color: var(--gold);
  border: 1px solid var(--gold-border); background: var(--gold-soft);
  border-radius: var(--r-sm); cursor: pointer; transition: background .15s;
}
.iti-btn:hover { background: var(--gold-hover); }
.nights { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.nights input {
  width: 26px; border: none; background: transparent; font-family: var(--sans);
  font-weight: 700; font-size: 13px; color: var(--ink); text-align: right; padding: 0;
  font-variant-numeric: tabular-nums; appearance: textfield; -moz-appearance: textfield;
}
.nights input::-webkit-inner-spin-button,
.nights input::-webkit-outer-spin-button { display: none; }
.nights span { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); }
.stop .subdate { font-family: 'Jost', sans-serif; font-style: italic; font-weight: 300; font-size: 14px; color: var(--green); margin: 1px 0 6px; }
.accom-btn {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  border: none; background: transparent; border-radius: var(--r-xs);
  padding: 4px 4px; margin-left: -4px; cursor: pointer; transition: background .15s;
}
.accom-btn:hover { background: #faf8f4; }
.accom-btn .lbl { flex: 1; min-width: 0; font-family: var(--sans); font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.accom-btn .chev { flex-shrink: 0; font-family: var(--sans); font-size: 11px; color: var(--ink-faint); font-weight: 700; }
.stop .foot { display: flex; align-items: flex-end; gap: 4px; margin-top: 2px; }
.grip {
  display: flex; align-items: flex-end; justify-content: center;
  width: 34px; height: 20px; cursor: grab; color: var(--ink-faint); flex-shrink: 0;
  margin: 0 0 0 -8px;                  /* usable touch target, minimal added card height */
  touch-action: none; opacity: .7;     /* quiet, matching the trash icon */
  position: relative; top: -1px;        /* align dots' bottom with the trash glyph bottom */
}
.grip:hover { opacity: 1; color: var(--ink-soft); }
.grip:active { cursor: grabbing; }
.grip svg { display: block; }
/* pointer-drag reorder feedback */
.stop.dragging { z-index: 6; opacity: .97; will-change: transform; transform: translateZ(0); }
.stop.dragging > .card { box-shadow: 0 5px 14px rgba(33,26,24,.16); border-color: var(--red); }
.stop.drop-before:not(.dragging) > .card { box-shadow: 0 -3px 0 -1px var(--red), 0 1px 2px rgba(33,26,24,.04); }
.stop.drop-after:not(.dragging) > .card { box-shadow: 0 3px 0 -1px var(--red), 0 1px 2px rgba(33,26,24,.04); }
.trash {
  display: flex; align-items: flex-end; justify-content: center; width: 18px; height: 20px;
  color: var(--ink-faint); border: none; background: transparent; cursor: pointer;
  margin-left: auto; border-radius: var(--r-check); transition: color .15s; opacity: .7;
}
.trash svg { width: 13px; height: 13px; display: block; }
.trash:hover { color: var(--red); opacity: 1; }
.grip:hover { opacity: 1; }

.add-stop {
  font-family: var(--sans); font-size: 22px; font-weight: 800; line-height: 1;
  color: #fff; background: var(--brown); border: none; border-radius: var(--r-btn);
  width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.add-stop:hover { opacity: .80; }
.add-stop:active { opacity: 1; }
.add-stop-wrap { padding-left: 40px; margin-top: 22px; }

/* ============================================================
   ASIDE (right column)
   ============================================================ */
.aside { flex: 0 1 280px; min-width: 240px; display: flex; flex-direction: column; gap: 16px; }

.map {
  height: 264px; width: 100%; border-radius: var(--r-card);
  border: 1px solid var(--line); overflow: hidden; background: var(--map-bg);
}
/* harmonise OSM tiles with the paper aesthetic */
.map .leaflet-tile-pane { filter: saturate(.62) sepia(.12) brightness(1.02) contrast(.96); }
.map .leaflet-container { background: var(--map-bg); font-family: var(--sans); }
.map-note { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); padding: 0 2px; line-height: 1.4; }

.summary { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 12px 18px; }
.stat { padding: 13px 0; border-bottom: 1px solid var(--line-2); }
.stat:last-child { border-bottom: none; }
.stat.clickable { cursor: pointer; }
.stat .fig { font-family: var(--caps); font-size: 42px; letter-spacing: .02em; color: var(--ink); line-height: .9; }
.stat.cash .fig  { color: var(--red); }
.stat.miles .fig { color: var(--gold); }
.stat.miles.covered .fig { color: var(--green); }
.stat.miles.covered .cap::after { content: ' ✓'; color: var(--green); }
.stat .cap { font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: .06em; color: var(--ink-mid); margin-top: 6px; text-transform: uppercase; }

.todos { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 17px 18px; }
.todos .hd { display: flex; align-items: baseline; gap: 8px; margin-bottom: 13px; }
.todos .hd .t { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink); }
.todos .hd .p { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); margin-left: auto; font-variant-numeric: tabular-nums; }
.todo { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.todo .box {
  flex-shrink: 0; width: 19px; height: 19px; border-radius: var(--r-check);
  border: 1.5px solid var(--dash); background: var(--surface); color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
}
.todo .box.done { background: var(--green); border-color: var(--green); }
.todo input.txt { flex: 1; min-width: 0; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); border: none; background: transparent; padding: 2px 0; outline-offset: 2px; }
.todo input.txt.done { color: var(--ink-mute); text-decoration: line-through; text-decoration-color: var(--green); animation: strikeThrough .3s cubic-bezier(0.16,1,0.3,1) both; }
.todo .x { flex-shrink: 0; font-family: var(--sans); font-size: 12px; line-height: 1; color: var(--ink-faint); border: none; background: transparent; cursor: pointer; padding: 4px; }
.add-todo {
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: var(--ink); background: transparent; border: 1px dashed var(--dash);
  border-radius: var(--r-sm); padding: 7px 14px; cursor: pointer; margin-top: 12px; width: 100%;
}

/* ============================================================
   MODALS (shared chrome)
   ============================================================ */
.overlay {
  position: fixed; inset: 0; background: rgba(35,20,12,.40);
  z-index: 1000;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 48px 20px; overflow-y: auto;
}
.dialog {
  background: var(--shell); width: 100%; border-radius: var(--r-modal);
  box-shadow: 0 24px 70px rgba(35,20,12,.28); overflow: hidden;
}
.dialog .head { padding: 24px 30px 20px; background: var(--surface); border-bottom: 1px solid var(--line); }
.dialog .head .row { display: flex; align-items: flex-start; gap: 14px; }
.eyebrow {
  font-family: var(--caps); font-size: 13px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); line-height: 1; margin-bottom: 8px;
}
.modal-x {
  font-family: var(--sans); font-size: 18px; line-height: 1; color: var(--ink-mute);
  border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-btn);
  padding: 8px 12px; cursor: pointer; flex-shrink: 0;
}
@keyframes strikeThrough { from { text-decoration-color: transparent; } to { text-decoration-color: var(--green); } }

/* ---- Itinerary modal ---- */
.overlay:has(.iti-dialog) { padding: 20px 16px; }
.iti-dialog {
  max-width: 1500px;
  height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
}
.iti-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.iti-left {
  flex: 0 0 40%;
  width: auto;
  overflow-y: auto;
  padding: 0 28px 28px;
  border-right: 1px solid var(--line);
}
.iti-right {
  flex: 1;
  overflow-y: auto;
  padding: 24px 30px 32px;
  animation: slideRight .24s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}
.iti-city { font-family: var(--serif); font-size: 29px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); border: none; background: transparent; padding: 0; width: 100%; }
.iti-sub { font-family: var(--script); font-style: italic; font-size: 14px; color: var(--green); margin-top: 4px; }

.cal { margin-top: 18px; }
.cal-month { margin-bottom: 6px; }
.cal-month .label { font-family: var(--sans); font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 10px; letter-spacing: -.01em; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { text-align: center; font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: .05em; color: var(--ink-mute); padding: 2px 0; }
.cal-off { height: auto; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; font-family: var(--sans); font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.cal-cell {
  position: relative; min-height: 120px; border-radius: var(--r-cell);
  background: var(--stay-fill); color: var(--ink-soft);
  font-family: var(--script); font-style: italic; font-weight: 300; font-size: 19px; letter-spacing: .01em;
  cursor: pointer; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 0; overflow: hidden; width: 100%;
  border: 1px solid var(--stay-line); transition: background .15s;
}
.cal-cell:hover { background: #F6E0D8; }
.cal-cell.active {
  border: 3px solid var(--brown); color: var(--ink);
  transform: scale(1.05); box-shadow: 0 6px 20px rgba(35,20,12,.2);
  z-index: 1;
}
.cal-cell img { width: 100%; flex: 1; min-height: 0; object-fit: contain; object-position: center; margin-top: 2px; margin-bottom: 6px; pointer-events: none; }

.iti-foot { padding: 0; }
.day-title { font-family: var(--script); font-style: italic; font-weight: 300; font-size: 18px; color: var(--ink); margin-bottom: 16px; }
.day-prompt { padding: 26px 30px 32px; text-align: center; }
.day-prompt p, .empty-note { font-family: var(--sans); font-size: 13px; color: var(--ink-mute); }

.item { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--line-2); }
.item .time { font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--ink-soft); border: none; background: transparent; padding: 4px 0; width: 62px; flex-shrink: 0; outline-offset: 2px; font-variant-numeric: tabular-nums; }
.item .mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.item .text { font-family: var(--sans); font-size: 14px; color: var(--ink); border: none; background: transparent; padding: 4px 0; width: 100%; outline-offset: 2px; }
.item .meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.item .field { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 120px; }
.item .field input { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); border: none; background: transparent; padding: 2px 0; flex: 1; min-width: 0; outline-offset: 2px; }
.item .maps { flex-shrink: 0; display: flex; align-items: center; color: var(--gold); text-decoration: none; font-family: var(--sans); font-size: 11px; font-weight: 700; }
.item .cost-field { flex: 0 1 72px; display: flex; align-items: center; gap: 3px; }
.item .cost-field .d { font-family: var(--sans); font-size: 10px; font-weight: 500; color: var(--ink-mute); flex-shrink: 0; }
.item .cost-field input { font-family: var(--sans); font-size: 10.5px; color: var(--ink-soft); border: none; background: transparent; padding: 2px 0; width: 100%; min-width: 0; font-variant-numeric: tabular-nums; }
.item .x { font-family: var(--sans); font-size: 13px; line-height: 1; color: var(--ink-faint); border: none; background: transparent; cursor: pointer; padding: 5px; flex-shrink: 0; }
.add-item, .add-option {
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: var(--ink); background: transparent; border: 1px dashed var(--dash);
  border-radius: var(--r-btn); padding: 7px 16px; cursor: pointer; margin-top: 16px;
}

/* ---- day-plan route optimizer ---- */
.day-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.day-head .day-title { margin-bottom: 0; }
.optimize-btn {
  margin-left: auto; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: .01em;
  color: var(--gold); background: var(--gold-soft);
  border: 1px solid var(--gold-border); border-radius: var(--r-pill);
  padding: 6px 13px 6px 11px; cursor: pointer; transition: background .15s, box-shadow .15s;
}
.optimize-btn:hover:not(:disabled) { background: var(--gold-hover); box-shadow: 0 2px 8px rgba(35,20,12,.1); }
.optimize-btn:disabled { opacity: .45; cursor: not-allowed; }
.optimize-btn svg { fill: currentColor; stroke: none; }

.optimize-note {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--green-bg); border: 1px solid color-mix(in oklch, var(--green) 24%, transparent);
  border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 14px;
  font-family: var(--sans); font-size: 12px; line-height: 1.45; color: var(--ink-mid);
}
.optimize-note.warn { background: var(--gold-soft); border-color: var(--gold-border); }
.optimize-note span { flex: 1; min-width: 0; }
.optimize-note .on-x { flex-shrink: 0; border: none; background: transparent; color: var(--ink-mute); cursor: pointer; font-size: 12px; line-height: 1; padding: 2px; }

/* ---- per-day focused map (inside the day column of the itinerary modal) ---- */
.day-cols { display: flex; gap: 22px; align-items: flex-start; }
.day-main { flex: 1; min-width: 0; }
.day-aside { flex: 0 0 260px; position: sticky; top: 4px; display: flex; flex-direction: column; gap: 7px; }
.daymap { height: 340px; }
/* Positron tiles: desaturate fully, add warm paper tint, push contrast so roads read */
.daymap.map .leaflet-tile-pane { filter: saturate(0) sepia(.18) brightness(.88) contrast(1.18); }
.daymap-cap { font-family: var(--sans); font-size: 10.5px; color: var(--ink-mute); line-height: 1.4; padding: 0 1px; }

/* activity number badge (matches its map pin) */
.item-num {
  flex-shrink: 0; width: 22px; height: 22px; margin-top: 1px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1;
  color: #fff; font-variant-numeric: tabular-nums;
  background: var(--red);
}
.item-num.placed { background: var(--red); }
.item-num:not(.placed):not(.empty) { background: var(--ink-faint); }  /* has address, locating */
.item-num.empty { background: transparent; color: var(--ink-faint); border: 1.5px solid var(--line); }

.map-stop-dot { cursor: pointer; }

/* numbered Leaflet divIcon pin — teardrop shape */
.day-pin {
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 2px 6px rgba(145,4,12,.30));
}
.day-pin span {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  background: var(--red); color: #fff;
  font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1;
}
.day-pin span::after {
  content: attr(data-n);
  transform: rotate(45deg);
  display: block;
}

/* click-a-pin highlight on the matching activity row */
.item.selected { background: rgba(145,4,12,.07); border-radius: 6px; outline: 1.5px solid rgba(145,4,12,.22); }
.item.flash { animation: itemFlash 1.3s ease; }
@keyframes itemFlash { 0% { background: rgba(145,4,12,.14); } 100% { background: transparent; } }

/* active (selected) pin — slightly larger + white border ring */
.day-pin.active { filter: drop-shadow(0 2px 8px rgba(145,4,12,.55)); }
.day-pin.active span { width: 32px; height: 32px; outline: 2.5px solid #fff; outline-offset: 1px; }

/* stack the map above the activity list when the day column gets narrow */
@media (max-width: 900px) {
  .day-cols { flex-direction: column-reverse; }
  .day-aside { position: static; flex-basis: auto; width: 100%; }
  .daymap { height: 260px; }
}

/* closet strip (in itinerary header) */
.closet { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
.closet .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.closet .hd .t { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--ink); }
.closet .hd .hint { font-family: var(--sans); font-size: 11px; color: var(--ink-mute); }
.closet .strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }
.outfit {
  position: relative; width: 52px; height: 62px; border-radius: var(--r-btn);
  overflow: hidden; cursor: grab; flex-shrink: 0;
}
.outfit img { width: 100%; height: 100%; object-fit: contain; }
.outfit .del { position: absolute; bottom: 2px; right: 2px; width: 15px; height: 15px; border-radius: 50%; border: none; background: rgba(255,255,255,.85); color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; padding: 0; }
.add-outfit {
  width: 52px; height: 62px; border: 2px dashed var(--dash); border-radius: var(--r-btn);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  cursor: pointer; background: #faf8f4; outline: none; flex-shrink: 0;
}
.add-outfit span { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); }

/* ---- Budget modal ---- */
.budget-dialog { max-width: 480px; }
.budget-total { font-family: var(--caps); font-size: 34px; letter-spacing: .03em; color: var(--red); line-height: 1; }
.budget-sub { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
.budget-body { padding: 10px 28px 26px; }
.bline { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line-2); }
.bline .info { flex: 1; min-width: 0; }
.bline .info .l { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--ink); }
.bline .info .m { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); margin-top: 3px; }
.bline .edit { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.bline .edit input { font-family: var(--sans); font-size: 13px; width: 66px; border: 1px solid var(--line); border-radius: var(--r-sm); padding: 6px 8px; background: var(--surface); text-align: right; color: var(--ink); font-variant-numeric: tabular-nums; }
.bline .edit .u { font-family: var(--sans); font-size: 9px; color: var(--ink-mute); width: 62px; }
.bline .amt { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink); width: 74px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.bline .amt input { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink); border: none; background: transparent; text-align: right; padding: 0; outline: none; cursor: text; width: 74px; font-variant-numeric: tabular-nums; }
.btotal { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 0 4px; }
.btotal .l { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink); }
.btotal .v { font-family: var(--caps); font-size: 24px; color: var(--red); letter-spacing: .02em; }
.budget-note { font-family: var(--sans); font-size: 11px; color: var(--ink-mute); line-height: 1.5; margin: 8px 0 0; }

/* ---- Accommodation modal ---- */
.accom-dialog { max-width: 640px; }
.accom-city { font-family: var(--serif); font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
.accom-sub { font-family: var(--script); font-style: italic; font-size: 13px; color: var(--green); margin-top: 5px; }
.accom-body { padding: 18px 26px 26px; display: flex; flex-direction: column; gap: 14px; }
.opt { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 17px 18px; display: flex; flex-direction: column; gap: 12px; position: relative; }
.opt.chosen { border-color: var(--green); }
.opt .top { display: flex; align-items: flex-start; gap: 10px; }
.opt .choose { flex-shrink: 0; margin-top: 3px; width: 20px; height: 20px; border-radius: var(--r-check); border: 2px solid var(--dash); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.opt.chosen .choose { border-color: var(--green); background: var(--green); }
.opt .name { font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--ink); border: none; background: transparent; padding: 0; flex: 1; min-width: 0; outline-offset: 2px; }
.opt .badge { font-family: var(--sans); font-size: 9px; font-weight: 700; color: var(--green); background: var(--green-bg); border-radius: var(--r-pill); padding: 3px 9px; letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0; }
.opt .rm { flex-shrink: 0; width: 28px; height: 28px; border: none; background: transparent; color: var(--ink-faint); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: var(--r-xs); transition: color .15s, background .15s; }
.opt .rm:hover { color: var(--red); background: #fef2f2; }
.opt .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
.opt .fld { display: flex; flex-direction: column; gap: 4px; }
.opt .fld label { font-family: var(--sans); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
.opt .fld .lk { display: flex; align-items: center; gap: 5px; }
.opt .fld input { font-family: var(--sans); font-size: 12px; color: var(--ink); border: none; border-bottom: 1px solid var(--line); background: transparent; padding: 3px 0; outline-offset: 2px; min-width: 0; }
.opt .fld input.price { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
.opt .fld .lk a { color: var(--gold); font-family: var(--sans); font-size: 12px; font-weight: 800; text-decoration: none; flex-shrink: 0; }

/* ---- Transport modal ---- */
.transport-dialog { max-width: 380px; }
.transport-city { font-family: var(--serif); font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
.transport-body { padding: 22px 26px 30px; display: flex; flex-direction: column; gap: 22px; }
.t-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.t-pill {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 6px 16px; border-radius: 20px;
  border: 1.5px solid var(--line); background: var(--surface); color: var(--ink-soft);
  cursor: pointer; transition: border-color .15s, background .15s, color .15s;
}
.t-pill:hover { border-color: var(--ink-mute); color: var(--ink); }
.t-pill.active { color: #fff; }
.t-row-3 { display: grid; grid-template-columns: 1fr 1fr 52px; gap: 20px; }
.t-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.t-fld { display: flex; flex-direction: column; gap: 7px; }
.t-fld label { font-family: var(--sans); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
.t-line-inp {
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  border: none; border-bottom: 1px solid var(--line); background: transparent;
  padding: 4px 0; width: 100%; min-width: 0; outline: none;
  font-variant-numeric: tabular-nums;
}
.t-line-inp::placeholder { color: var(--ink-faint); }
.t-line-inp:focus { border-bottom-color: var(--ink); }
.t-transfer { text-align: center; }
.t-cost-row { display: flex; align-items: baseline; gap: 4px; border-bottom: 1px solid var(--line); }
.t-cost-row .t-line-inp { border-bottom: none; }
.t-unit { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); flex-shrink: 0; }
.t-cost-row:focus-within { border-bottom-color: var(--ink); }

/* mc-transport-btn tints the route icon with mode color */
.mc-back .mc-transport-btn { border-color: currentColor; opacity: 0.85; }

/* responsive: narrow screens — aside stacks below map, page scrolls */
@media (max-width: 799px) {
  .aside { flex-basis: 100%; }
  .page { padding: 16px 12px 60px; }
  .iti-dialog { height: calc(100vh - 64px); }
  .iti-body { flex-direction: column; overflow-y: auto; }
  .iti-left { width: 100%; border-right: none; border-bottom: 1px solid var(--line); overflow-y: visible; }
  .iti-right { overflow-y: visible; padding: 20px 18px 28px; animation: none; }
}

/* ============================================================
   PLACED STICKER LAYER
   ============================================================ */
.placed-stickers-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 10;
}
.placed-stickers-layer--modal {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 1020;
}
.placed-sticker {
  position: absolute;
  pointer-events: auto;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.placed-sticker:active { cursor: grabbing; }
.placed-sticker img {
  display: block;
  width: 100%;
  height: auto;
  pointer-events: none;
  filter: drop-shadow(0 2px 10px rgba(35,20,12,.18));
}
.placed-sticker__delete {
  position: absolute;
  top: -8px; right: -8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: var(--surface);
  color: var(--ink-soft);
  font-size: 13px; line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  padding: 0;
  font-family: var(--sans); font-weight: 700;
  transition: color .15s, border-color .15s;
  z-index: 2;
}
.placed-sticker__delete:hover { color: var(--red); border-color: var(--red); }
.placed-sticker:hover .placed-sticker__delete { display: flex; }
.placed-sticker__resize {
  position: absolute;
  bottom: -5px; right: -5px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--brown);
  border: 2px solid var(--surface);
  cursor: se-resize;
  display: none;
  z-index: 2;
}
.placed-sticker:hover .placed-sticker__resize { display: block; }

/* ============================================================
   STICKER PANEL
   ============================================================ */
.sticker-panel {
  position: fixed;
  top: 88px; right: 28px;
  width: 284px;
  background: var(--shell);
  border: 1.5px solid var(--line-3);
  border-radius: var(--r-card);
  z-index: 1050;
}
.sticker-panel__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px 10px;
  border-bottom: 1.5px solid var(--line-3);
}
.sticker-panel__hint {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink-mute);
  padding: 8px 14px 4px;
  line-height: 1.45;
}
.sticker-panel__strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px 16px;
  max-height: 260px;
  overflow-y: auto;
}
.stock-item {
  position: relative;
  width: 52px; height: 62px;
  border-radius: var(--r-btn);
  overflow: hidden;
  cursor: grab;
  flex-shrink: 0;
}
.stock-item:active { cursor: grabbing; }
.stock-item img { width: 100%; height: 100%; object-fit: contain; border-radius: var(--r-btn); }
.stock-item__del {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 15px; height: 15px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,.88);
  color: var(--ink-soft);
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  font-size: 11px; line-height: 1;
  padding: 0;
  font-family: var(--sans);
}
.stock-item:hover .stock-item__del { display: flex; }
.tool-btn.active { background: var(--line-2); color: var(--ink); }

@media (max-width: 720px) {
  .sticker-panel { right: 16px; width: calc(100vw - 32px); }
}

/* ---- Cross-device sync ---- */
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  margin-right: 5px; background: var(--ink-mute);
  box-shadow: 0 0 0 2px color-mix(in oklch, var(--ink-mute) 22%, transparent);
}
.sync-dot.s-off     { background: var(--ink-mute); box-shadow: none; }
.sync-dot.s-synced  { background: var(--green);  box-shadow: 0 0 0 2px var(--green-bg); }
.sync-dot.s-syncing { background: var(--gold);   box-shadow: 0 0 0 2px var(--gold-soft); animation: syncPulse 1s ease-in-out infinite; }
.sync-dot.s-offline { background: var(--ink-mute); }
.sync-dot.s-error   { background: var(--red); box-shadow: 0 0 0 2px color-mix(in oklch, var(--red) 18%, transparent); }
@keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
@media (max-width: 480px) { .sync-toggle-btn .sync-dot { position: absolute; top: 4px; right: 4px; margin: 0; } .sync-toggle-btn { position: relative; } }

.sync-dialog { max-width: 440px; }
.sync-title { font-family: var(--serif); font-weight: 700; font-size: 26px; color: var(--ink); line-height: 1.05; }
.sync-body { padding: 22px 30px 28px; display: flex; flex-direction: column; gap: 14px; }
.sync-lead { font-family: var(--sans); font-size: 13.5px; line-height: 1.5; color: var(--ink-soft); margin: 0; }
.sync-lead b { color: var(--ink); font-weight: 600; }
.sync-field-lbl { font-family: var(--caps); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); }
.sync-code-row { display: flex; gap: 8px; }
.sync-code-row input {
  flex: 1; min-width: 0; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); font-family: var(--sans); font-size: 13px; color: var(--ink);
}
.sync-code-out { font-variant-numeric: tabular-nums; letter-spacing: .02em; }
.sync-btn {
  font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
  padding: 10px 16px; border-radius: var(--r-sm); border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); white-space: nowrap; transition: background .15s, border-color .15s;
}
.sync-btn:hover { background: var(--line-2); }
.sync-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
.sync-btn.primary:hover { background: color-mix(in oklch, var(--red) 88%, #000); }
.sync-btn.ghost { color: var(--ink-soft); }
.sync-btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
.sync-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.sync-actions .sync-btn { flex: 1; text-align: center; }
.sync-or { display: flex; align-items: center; gap: 10px; color: var(--ink-mute); font-family: var(--caps); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
.sync-or::before, .sync-or::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.sync-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 18px; }
.sync-status { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
.sync-status.s-synced  { color: var(--green); }
.sync-status.s-syncing { color: var(--gold); }
.sync-status.s-error   { color: var(--red); }
.sync-status.s-offline { color: var(--ink-mute); }
.sync-when { font-family: var(--script); font-style: italic; font-size: 12.5px; color: var(--ink-mute); }
.sync-note { font-family: var(--sans); font-size: 11.5px; line-height: 1.5; color: var(--ink-mute); margin: 4px 0 0; }
.sync-steps { margin: 2px 0 4px; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; }
.sync-steps li { font-family: var(--sans); font-size: 13px; line-height: 1.45; color: var(--ink-soft); }
.sync-steps b { color: var(--ink); font-weight: 600; }
.sync-steps code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px; background: var(--line-2); padding: 1px 5px; border-radius: 4px; color: var(--ink-mid); }
.sync-link { color: var(--red); font-weight: 600; text-decoration: none; border-bottom: 1px solid color-mix(in oklch, var(--red) 40%, transparent); }
.sync-link:hover { border-bottom-color: var(--red); }

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  .iti-right { animation: none; }
  .todo input.txt.done { animation: none; text-decoration-color: var(--green); }
  .sync-dot.s-syncing { animation: none; opacity: 1; }
  .stop { transition: none; }
  .cal-cell { transition: none; }
  .cal-cell.active { transform: none; }
}

/* ============================================================
   PHONE (≤480px) — after the 720px block so phone wins
   ============================================================ */
@media (max-width: 480px) {
  /* trip title: tighter than the 38px set in the 720px block */
  .trip-title { font-size: 30px; }

  /* stop city: 28px clips behind the iti-btn and nights on narrow screens */
  .stop .city { font-size: 20px; letter-spacing: .04em; }

  /* leg row: compact everything onto one line */
  .leg .inner { gap: 5px; flex-wrap: nowrap; }
  .leg select { font-size: 11px; padding: 4px 6px; max-width: 90px; }
  .leg .dur { min-width: 0; flex: 1 1 60px; }
  .leg .cost { width: 48px; }
  .leg .unit { display: none; }

  /* endpoint: loosen origin input so the date can sit alongside */
  .endpoint input { min-width: 90px; }
}

/* ============================================================
   MAP ROUTE — container-type:size so canvas can use cqi/cqb
   ============================================================ */
.map-route {
  flex: 1 1 480px; min-width: 320px; min-height: 0;
  position: relative;
  align-self: flex-start; /* natural height; overridden in wide-screen media query */
}

.map-canvas {
  position: relative;
  width: 100%;
  aspect-ratio: 740 / 480;
  overflow: visible;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
  /* enables cqi for pin overlays (relative to canvas width) */
  container-type: inline-size;
}

.map-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block; border-radius: var(--r-card);
}

/* ============================================================
   MAIN LEAFLET MAP — replaces static SVG canvas
   ============================================================ */
.main-map-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 740 / 480;
  overflow: visible;
  /* isolate so Leaflet's internal z-indices (200–700) stay contained here */
  isolation: isolate;
}
.main-map-leaflet {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
}
.main-map-leaflet.leaflet-container { background: #e0d8cc; font-family: var(--sans); }

/* smooth rounded joins on country border paths */
.map-country { stroke-linejoin: round; stroke-linecap: round; }

/* city name labels on the minimal basemap */
.map-city-label {
  font-family: var(--sans); font-size: 7.5px; font-weight: 600;
  color: #c9a868; text-transform: uppercase; letter-spacing: .09em;
  white-space: nowrap; pointer-events: none; line-height: 1;
  padding-left: 2px;
}
.main-pins-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 710;
  overflow: visible;
}
.main-city-labels-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 720;
  overflow: visible;
}
.main-leaders-svg {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 750;
  width: 100%; height: 100%;
  overflow: visible;
}
.main-cards-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 800;
}
.main-cards-overlay .map-stop {
  width: 155px;
  pointer-events: all;
}
.map-pin-outer {
  position: absolute;
  pointer-events: all;
}
.map-pin-main-wrap { background: none; border: none; }
.map-pin-main {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--red);
  border: 2px solid oklch(97% 0.005 60);
  display: flex; align-items: center; justify-content: center;
}
.map-pin-main .pin-order-input {
  width: 22px; height: 22px;
  font-size: 9px; line-height: 22px;
}

/* ============================================================
   VIEWPORT-FIT MODE — everything in one screen height (≥ 800px)
   Below 800px: aside stacks under map, page scrolls normally
   ============================================================ */
@media (min-width: 800px) {
  html, body { overflow: hidden; }
  .page {
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    overflow: hidden; padding-bottom: 30px;
  }
  .trip-title { font-size: 38px; }
  .body-cols {
    flex: 1 1 0; min-height: 0;
    flex-wrap: nowrap; overflow: hidden;
    align-items: flex-start; /* map-route only as tall as its canvas */
  }
  /* map-route stretches to body-cols height so the Leaflet coordinate space
     never exceeds the visible area — prevents pins clipping at the bottom edge */
  .map-route {
    align-self: stretch;
    overflow: hidden;
  }
  /* unset aspect-ratio so the map canvas fills the constrained height exactly */
  .main-map-wrap {
    height: 100%;
    aspect-ratio: unset;
  }
  .aside {
    flex: 0 0 290px; min-width: 0;
    position: static; overflow-y: auto;
    scrollbar-width: thin;
    align-self: stretch; /* aside fills full body-cols height */
    padding-bottom: 4px;
  }
}

/* ============================================================
   STOP CARDS — proportional scaling via CSS container queries
   .map-stop has container-type:inline-size so all cqw values
   inside the card are relative to the card's own width.
   Card width = 28% of canvas = 207px at natural 740px canvas.
   Conversion: Xpx → (X/207 × 100)cqw  ≈  X/2.07 cqw
   ============================================================ */
.map-stop {
  position: absolute;
  width: 20%; /* scales with canvas */
  padding: 0; contain: none; z-index: 2;
  container-type: inline-size; /* cqw = % of card width */
  perspective: 338cqw; /* 700px / 207px × 100 */
}

/* flip wrapper — height proportional to width via aspect-ratio */
.mc-flip {
  position: relative;
  aspect-ratio: 210 / 100;
  padding: 0; box-shadow: none;
  transform-style: preserve-3d;
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1) 0.18s;
}
.map-stop:not(.mc-dragging):hover .mc-flip,
.map-stop:not(.mc-dragging):focus-within .mc-flip,
.map-stop.mc-editing .mc-flip {
  transform: rotateY(180deg); transition-delay: 0s;
}
.map-stop.mc-dragging .mc-flip { transform: rotateY(180deg); transition: none; }

/* shared face */
.mc-front, .mc-back {
  position: absolute; inset: 0;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
  background: #fff;
  box-shadow: 0 2px 10px rgba(33,26,24,.10);
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* FRONT face — all sizes in cqw */
.mc-front {
  padding: 4.3cqw 5.8cqw 4.3cqw;
  display: flex; flex-direction: column; justify-content: flex-start; gap: 2cqw;
  cursor: default;
}
.mc-mode-pip {
  position: absolute; top: 4.3cqw; right: 5.8cqw;
  width: 2.9cqw; height: 2.9cqw;
  border-radius: 50%; opacity: 0.85;
}
.mc-city-display {
  font-family: 'Josefin Sans', sans-serif; font-weight: 800;
  text-transform: uppercase; letter-spacing: .06em; line-height: 1.1;
  font-size: 12cqw;
  color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-right: 8.7cqw;
}
.mc-meta { display: flex; flex-direction: column; gap: 2cqw; }
.mc-dates-display {
  font-size: 6cqw;
  font-family: var(--sans); color: #3a7d44; letter-spacing: .01em;
}
.mc-hotel-display {
  font-size: 7.5cqw;
  font-family: var(--sans); color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mc-hotel-empty { opacity: 0.28; }

/* BACK face — overflow:hidden while rotated away prevents iOS Safari scroll indicator
   bleeding through the 3D transform onto the front face */
.mc-back {
  transform: rotateY(180deg);
  padding: 4.3cqw 5.3cqw 3.35cqw;
  display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; gap: 0;
  overflow-y: hidden;
  pointer-events: none;
}
.map-stop:not(.mc-dragging):hover .mc-front { pointer-events: none; }
.map-stop:not(.mc-dragging):hover .mc-back,
.map-stop.mc-dragging .mc-back { pointer-events: auto; overflow-y: auto; scrollbar-width: none; }
.map-stop:not(.mc-dragging):hover .mc-back::-webkit-scrollbar,
.map-stop.mc-dragging .mc-back::-webkit-scrollbar { display: none; }

/* back: compact overrides — cqw relative to .map-stop width */
.mc-back .city { font-size: 6.3cqw; letter-spacing: 0; }
.mc-back .head { flex-direction: column; align-items: flex-start; gap: 6.2cqw; width: 100%; margin-bottom: 0; }
.mc-top-row { display: flex; align-items: center; gap: 1.9cqw; width: 100%; }
.mc-top-row .city { flex: 1; min-width: 0; }
.mc-btn-row { display: flex; align-items: center; gap: 1.9cqw; }
.mc-back .iti-btn { width: 11.6cqw; height: 11.6cqw; }
.mc-back .nights input { font-size: 5.8cqw; width: 10.6cqw; }
.mc-back .nights span  { font-size: 4.3cqw; }
.mc-back .foot { margin-top: 0.5cqw; }

/* editable order number — overlay on SVG pin; scaled via cqi relative to canvas */
.map-pin-num {
  position: absolute; transform: translate(-50%, -50%);
  z-index: 3;
  width: 2.97cqi; height: 2.97cqi; /* 22px / 740px × 100 */
}
.pin-order-input {
  width: 2.97cqi; height: 2.97cqi;
  border-radius: 50%; border: none;
  background: transparent; color: #fff;
  font-size: 1.22cqi; /* 9px / 740px × 100 */
  font-weight: 700; text-align: center;
  cursor: pointer; padding: 0; line-height: 2.97cqi;
  appearance: none; -moz-appearance: textfield;
  font-family: var(--sans);
}
.pin-order-input::-webkit-inner-spin-button,
.pin-order-input::-webkit-outer-spin-button { display: none; }
.pin-order-input:focus {
  outline: none; background: var(--red);
  box-shadow: 0 0 0 0.27cqi oklch(97% 0.005 60), 0 0 0 0.54cqi var(--red);
}

/* compact leg row inside map card back — cqw from .map-stop */
.map-leg-row {
  display: flex; align-items: center; gap: 1.9cqw; flex-wrap: wrap;
  padding: 1.4cqw 0 1.9cqw; margin-top: 0;
}
.map-leg-row .mode-dot { width: 2.9cqw; height: 2.9cqw; border-radius: 50%; flex-shrink: 0; }
.map-leg-row select {
  font-family: var(--sans); font-size: 4.8cqw; font-weight: 500;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 1.4cqw 2.4cqw;
  background: var(--surface); color: var(--ink); cursor: pointer; max-width: 36.7cqw;
}
.map-leg-row .dur {
  font-family: var(--sans); font-size: 4.8cqw; color: var(--ink-soft);
  border: none; border-bottom: 1px solid var(--line); background: transparent;
  padding: 1cqw; order: 9; flex-basis: 100%; min-width: 0; outline-offset: 1px;
}
.map-leg-row .cost-wrap { display: inline-flex; align-items: center; gap: 1.4cqw; }
.map-leg-row .cost-wrap--fb { background: var(--gold-soft); border-radius: var(--r-xs); padding: 0 1.9cqw 0 1.4cqw; border: 1px solid var(--gold-border); }
.map-leg-row .cost-wrap--fb .cost { background: transparent; border-color: transparent; color: var(--gold); }
.map-leg-row .cost-wrap--fb .unit { color: var(--gold); font-weight: 600; }
.map-leg-row .cost {
  font-family: var(--sans); font-size: 4.8cqw; width: 21.3cqw;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 1.4cqw 1.9cqw;
  background: var(--surface); text-align: right; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.map-leg-row .unit { font-family: var(--sans); font-size: 4.3cqw; color: var(--ink-mute); }

/* origin / home endpoint labels */
.map-ep {
  position: absolute; z-index: 3;
  display: flex; flex-direction: column; gap: 1px;
  background: rgba(245,242,236,.92); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: 5px 8px;
  backdrop-filter: blur(4px);
}
.map-origin { top: 8px; left: 8px; }
.map-home   { bottom: 8px; right: 8px; }
.map-ep input {
  font-family: var(--sans); font-size: 11px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; padding: 0; min-width: 88px; outline-offset: 2px;
}
.map-ep-date {
  font-family: var(--script); font-style: italic; font-size: 11px; color: var(--ink-soft);
}

/* floating add-stop button on the map */
.map-add-btn {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: #fff; background: var(--brown); border: none; border-radius: var(--r-btn);
  width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(33,26,24,.28);
  transition: opacity .15s;
}
.map-add-btn:hover  { opacity: .82; }
.map-add-btn:active { opacity: 1; }

/* on very narrow screens, let map scroll horizontally rather than collapse */
@media (max-width: 500px) {
  .map-canvas { min-width: 420px; }
  .map-route { overflow-x: auto; }
}

       ------------------------------------------------------------

       store; both devices link the same short code and pull/push
       automatically. Conflict policy is simple last-write-wins, keyed

    loadSyncRec() {
      try { const v = localStorage.getItem(SYNC_KEY); if (v) return JSON.parse(v); } catch (e) {}

    parseCode(code) {
      let c = (code || '').trim();
      const url = c.match(/(?:jsonBlob|bin)\/([^/\s?#]+)/i);     // full URL paste
      if (url) c = url[1];
      const m = c.match(/^([a-z])-(.+)$/i);
      if (m && SYNC_BACKENDS[m[1]]) return { be: SYNC_BACKENDS[m[1]], id: m[2] };
      return { be: SYNC_BACKENDS[SYNC_ORDER[0]], id: c };          // legacy / untagged

      er.code = 'unreachable'; return er;

    async cloudGet(code) {
      const { be, id } = this.parseCode(code);
      let txt;
      try { txt = await be.get(id); } catch (e) { throw this.normErr(e); }
      if (!txt) throw _notFound();
      try { return JSON.parse(txt); } catch (e) { throw new Error('Synced data was unreadable.'); }
    }
    async cloudPut(code) {
      const { be, id } = this.parseCode(code);
      try { await be.put(id, this.cloudPayload()); } catch (e) { throw this.normErr(e); }
    }

    async createSync() {
